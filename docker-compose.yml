version: '3.8'

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: apex-api
    ports:
      - "7071:7071"
    environment:
      PORT: 7071
      DB_PATH: /app/data/apex.db
    volumes:
      - api-data:/app/data
    networks:
      - apex-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7071/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex-app
    ports:
      - "80:80"
    environment:
      - VITE_API_BASE_URL=/api
    depends_on:
      api:
        condition: service_healthy
    networks:
      - apex-network

volumes:
  api-data:

networks:
  apex-network:
    driver: bridge
